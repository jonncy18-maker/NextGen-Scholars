<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>April — NextGen Scholars</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
/* ── base ── */
html, body, #root { height: 100%; margin: 0; }
body { background: var(--ngs-paper); }

/* ── design tokens ── */
:root {
  --ngs-navy: #1B2A4A;
  --ngs-navy-deep: #131F38;
  --ngs-navy-ink: #0E1A33;
  --ngs-gold: #C9A84C;
  --ngs-gold-soft: #E4C97A;
  --ngs-paper: #FAF7F0;
  --ngs-paper-2: #F2EDE2;
  --ngs-ink: #1A1A1A;
  --ngs-ink-soft: #4A4E5E;
  --ngs-muted: #6B6E7A;
  --ngs-rule: rgba(27, 42, 74, 0.12);
  --ngs-rule-light: rgba(255, 255, 255, 0.18);
  --ngs-red: #B11B2A;
  --ngs-display: 'Newsreader', 'Iowan Old Style', Georgia, serif;
  --ngs-sans: 'Manrope', 'Helvetica Neue', Helvetica, system-ui, sans-serif;
  --ngs-mono: 'IBM Plex Mono', ui-monospace, monospace;
}

/* ── NGS mark (logo badge) ── */
.ngs-mark {
  display: inline-flex; padding: 6px 9px;
  background: var(--ngs-navy);
  color: var(--ngs-gold);
  font-family: var(--ngs-display);
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.18em;
  border-radius: 3px;
}
.ngs-mark span + span { margin-left: 1px; }
.ngs-mark-sm { padding: 5px 8px; font-size: 11px; }

/* ── pulse animation ── */
@keyframes ngs-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(201, 168, 76, 0.5); }
  50% { box-shadow: 0 0 0 8px rgba(201, 168, 76, 0); }
}
</style>

<style>
/* Scholar profile pages — extends styles.css.
   Reuses --ngs-* tokens; adds profile-specific scaffolding. */

/* ── page shell ───────────────────────────────────────────── */
.ngs-profile {
  font-family: var(--ngs-sans);
  color: var(--ngs-ink);
  background: var(--ngs-paper);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100%;
}
.ngs-profile * { box-sizing: border-box; }
.ngs-profile h1, .ngs-profile h2, .ngs-profile h3, .ngs-profile h4 {
  margin: 0; font-weight: 500; letter-spacing: -0.01em;
  text-wrap: balance;
}
.ngs-profile p { margin: 0; }
.ngs-profile a { color: inherit; text-decoration: none; }
.ngs-profile ol, .ngs-profile ul { margin: 0; padding: 0; list-style: none; }
.ngs-profile button { font-family: inherit; cursor: pointer; border: 0; background: none; }
.ngs-profile em, .ngs-profile .ngs-italic {
  font-family: var(--ngs-display);
  font-style: italic;
  font-weight: 400;
}

/* ── top nav ──────────────────────────────────────────────── */
.ngs-pnav {
  position: sticky; top: 0; z-index: 30;
  background: rgba(250, 247, 240, 0.86);
  backdrop-filter: blur(14px) saturate(180%);
  -webkit-backdrop-filter: blur(14px) saturate(180%);
  border-bottom: 1px solid var(--ngs-rule);
}
.ngs-profile.is-mobile .ngs-pnav-inner { padding-top: 64px; }
.ngs-pnav-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
}
.ngs-pnav-brand {
  display: flex; align-items: center; gap: 10px;
  color: var(--ngs-navy);
}
.ngs-pnav-name {
  font-family: var(--ngs-display);
  font-size: 16px; font-weight: 500; letter-spacing: -0.01em;
}
.ngs-pnav-back {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ngs-muted);
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid var(--ngs-rule);
  transition: all 0.18s ease;
}
.ngs-pnav-back:hover { color: var(--ngs-navy); border-color: var(--ngs-navy); }
.ngs-pnav-back::before { content: '←'; opacity: 0.5; }

/* ── PHOTO HEADER ─────────────────────────────────────────── */
.ngs-phead {
  position: relative;
  background: var(--ngs-navy);
  color: var(--ngs-paper);
  overflow: hidden;
}
.ngs-phead-photo {
  position: relative;
  aspect-ratio: 3 / 4;
  background:
    radial-gradient(60% 60% at 30% 30%, rgba(201,168,76,0.18), transparent 70%),
    repeating-linear-gradient(135deg,
      rgba(255,255,255,0.04) 0 10px,
      rgba(255,255,255,0.02) 10px 20px),
    var(--ngs-navy-deep);
  display: flex; align-items: center; justify-content: center;
}
.ngs-phead-photo-label {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px;
  font-family: var(--ngs-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(250, 247, 240, 0.35);
}
.ngs-phead-photo-label span:last-child {
  text-transform: lowercase;
  letter-spacing: 0.04em;
  color: rgba(250, 247, 240, 0.25);
}
.ngs-phead-photo::before {
  content: '';
  position: absolute; inset: auto 0 0 0;
  height: 50%;
  background: linear-gradient(to bottom, transparent, var(--ngs-navy));
  pointer-events: none;
}
.ngs-phead-photo-status {
  position: absolute; top: 18px; right: 18px;
  padding: 5px 10px;
  border-radius: 3px;
  font-family: var(--ngs-mono);
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.14em;
}
.ngs-phead-photo-status.is-active { background: var(--ngs-gold); color: var(--ngs-navy); }
.ngs-phead-photo-status.is-trial { background: var(--ngs-navy); color: var(--ngs-gold); border: 1px solid var(--ngs-gold); }
.ngs-phead-photo-status.is-paused { background: transparent; color: var(--ngs-red); border: 1px solid var(--ngs-red); }

.ngs-phead-meta {
  position: relative;
  padding: 0 24px 36px;
  margin-top: -40px; /* lift over the gradient bleed */
  z-index: 1;
}
.ngs-phead-track {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--ngs-mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ngs-gold);
  margin-bottom: 14px;
}
.ngs-phead-track-dot {
  width: 6px; height: 6px; border-radius: 999px;
  background: var(--ngs-gold);
}
.ngs-phead-name {
  font-family: var(--ngs-display);
  font-size: 64px; font-weight: 400;
  line-height: 0.95;
  letter-spacing: -0.025em;
  color: var(--ngs-paper);
  margin-bottom: 18px;
}
.ngs-phead-school {
  font-size: 14px;
  color: rgba(250, 247, 240, 0.65);
  line-height: 1.5;
  max-width: 32ch;
  margin-bottom: 22px;
}
.ngs-phead-school strong {
  color: var(--ngs-paper);
  font-weight: 500;
}
.ngs-phead-stats {
  display: flex;
  gap: 14px;
  padding-top: 22px;
  border-top: 1px solid rgba(255, 255, 255, 0.14);
}
.ngs-phead-stats > div {
  flex: 1;
  display: flex; flex-direction: column; gap: 4px;
}
.ngs-phead-stats strong {
  font-family: var(--ngs-display);
  font-size: 26px; font-weight: 400;
  color: var(--ngs-gold);
  letter-spacing: -0.02em;
  line-height: 1;
}
.ngs-phead-stats span {
  font-family: var(--ngs-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: rgba(250, 247, 240, 0.5);
}

/* ── TRIAL BANNER ────────────────────────────────────────── */
.ngs-tbanner {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 18px 24px;
  background: var(--ngs-navy);
  color: var(--ngs-paper);
  border-top: 1px solid rgba(201, 168, 76, 0.25);
  border-bottom: 1px solid rgba(201, 168, 76, 0.25);
}
.ngs-tbanner-icon {
  width: 36px; height: 36px;
  flex-shrink: 0;
  color: var(--ngs-gold);
  display: flex; align-items: center; justify-content: center;
  background: rgba(201, 168, 76, 0.1);
  border-radius: 999px;
}
.ngs-tbanner-text {
  font-size: 13.5px;
  line-height: 1.55;
  color: rgba(250, 247, 240, 0.78);
  text-wrap: pretty;
  padding-top: 6px;
}
.ngs-tbanner-text strong {
  color: var(--ngs-gold);
  font-weight: 600;
}

/* ── TRIAL PROGRESS ──────────────────────────────────────── */
.ngs-tprogress {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 18px;
}
.ngs-tsem {
  padding: 14px 12px;
  background: var(--ngs-paper);
  border: 1px solid var(--ngs-rule);
  border-radius: 4px;
  text-align: center;
}
.ngs-tsem.is-active {
  background: var(--ngs-navy);
  border-color: var(--ngs-gold);
  color: var(--ngs-paper);
}
.ngs-tsem.is-future {
  opacity: 0.55;
}
.ngs-tsem-label {
  font-family: var(--ngs-mono);
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ngs-muted);
  margin-bottom: 8px;
}
.ngs-tsem.is-active .ngs-tsem-label { color: var(--ngs-gold); }
.ngs-tsem-grade {
  font-family: var(--ngs-display);
  font-size: 28px;
  font-weight: 400;
  color: var(--ngs-navy);
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 6px;
}
.ngs-tsem.is-active .ngs-tsem-grade { color: var(--ngs-gold); }
.ngs-tsem.is-future .ngs-tsem-grade { color: var(--ngs-muted); }
.ngs-tsem-status {
  font-family: var(--ngs-mono);
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ngs-muted);
}
.ngs-tsem.is-active .ngs-tsem-status { color: rgba(250, 247, 240, 0.5); }

.ngs-tfloor {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 14px 16px;
  background: var(--ngs-paper);
  border: 1px solid var(--ngs-rule);
  border-radius: 4px;
  font-size: 13px;
  color: var(--ngs-ink-soft);
  margin-bottom: 28px;
}
.ngs-tfloor-mark {
  color: var(--ngs-gold);
  font-size: 11px;
  line-height: 1.5;
}
.ngs-tfloor strong {
  color: var(--ngs-navy);
  font-weight: 600;
}
.ngs-tfloor-detail { color: var(--ngs-ink-soft); font-weight: 400; }

.ngs-tnext {
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--ngs-rule);
}
.ngs-tnext-head {
  font-family: var(--ngs-mono);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ngs-muted);
  margin-bottom: 14px;
}
.ngs-tnext-list {
  display: flex; flex-direction: column;
}
.ngs-tnext-row {
  display: flex; flex-direction: column;
  gap: 3px;
  padding: 14px 0;
  border-bottom: 1px dotted var(--ngs-rule);
}
.ngs-tnext-row:last-child { border-bottom: 0; }
.ngs-tnext-row.is-highlight .ngs-tnext-name { color: var(--ngs-gold); }
.ngs-tnext-name {
  font-family: var(--ngs-display);
  font-size: 17px;
  color: var(--ngs-navy);
}
.ngs-tnext-detail {
  font-size: 13px;
  color: var(--ngs-ink-soft);
  line-height: 1.5;
}

/* ── PULL QUOTE ───────────────────────────────────────────── */
.ngs-pquote {
  padding: 48px 24px;
  background: var(--ngs-paper);
  border-bottom: 1px solid var(--ngs-rule);
}
.ngs-pquote-mark {
  font-family: var(--ngs-display);
  font-size: 64px;
  line-height: 0.5;
  color: var(--ngs-gold);
  margin-bottom: 14px;
  display: block;
}
.ngs-pquote-body {
  font-family: var(--ngs-display);
  font-style: italic;
  font-weight: 400;
  font-size: 24px;
  line-height: 1.3;
  color: var(--ngs-navy);
  text-wrap: pretty;
  max-width: 32ch;
}

/* ── SECTION SCAFFOLD ─────────────────────────────────────── */
.ngs-psection {
  padding: 56px 24px;
  border-top: 1px solid var(--ngs-rule);
}
.ngs-psection:first-of-type { border-top: 0; }
.ngs-psection-eyebrow {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ngs-navy);
  margin-bottom: 18px;
  font-weight: 600;
}
.ngs-psection-eyebrow-rule {
  width: 24px; height: 1px; background: var(--ngs-gold);
}
.ngs-psection h2 {
  font-family: var(--ngs-display);
  font-size: 32px;
  line-height: 1.1;
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--ngs-navy);
  margin-bottom: 14px;
}
.ngs-psection-intro {
  font-size: 14.5px;
  color: var(--ngs-ink-soft);
  line-height: 1.55;
  max-width: 38ch;
  margin-bottom: 28px;
}
.ngs-psection.is-paper-2 { background: var(--ngs-paper-2); }

/* ── SEMESTER ─────────────────────────────────────────────── */
.ngs-semester-stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.ngs-semstat {
  padding: 16px;
  background: var(--ngs-paper);
  border: 1px solid var(--ngs-rule);
  border-radius: 4px;
}
.ngs-semstat-value {
  font-family: var(--ngs-display);
  font-size: 22px;
  color: var(--ngs-navy);
  letter-spacing: -0.02em;
  margin-bottom: 3px;
}
.ngs-semstat-value.is-gold { color: var(--ngs-gold); }
.ngs-semstat-label {
  font-family: var(--ngs-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ngs-muted);
}
.ngs-subjects {
  display: flex; flex-direction: column;
  border-top: 1px solid var(--ngs-rule);
}
.ngs-subjects-head {
  font-family: var(--ngs-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ngs-muted);
  padding: 14px 0 10px;
}
.ngs-subject {
  display: flex; align-items: baseline; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px dotted var(--ngs-rule);
  font-size: 14px;
  color: var(--ngs-ink);
}
.ngs-subject:last-child { border-bottom: 0; }
.ngs-subject-num {
  font-family: var(--ngs-mono);
  font-size: 10.5px;
  color: var(--ngs-gold);
  letter-spacing: 0.1em;
  min-width: 22px;
}

/* ── ACADEMIC STANDING ───────────────────────────────────── */
.ngs-gpa-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 10px;
}
.ngs-gpa-label {
  font-family: var(--ngs-mono);
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ngs-muted);
}
.ngs-gpa-value {
  font-family: var(--ngs-display);
  font-size: 48px;
  font-weight: 400;
  color: var(--ngs-navy);
  letter-spacing: -0.025em;
  line-height: 1;
}
.ngs-gpa-bar {
  height: 4px;
  background: var(--ngs-rule);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 8px;
  position: relative;
}
.ngs-gpa-fill {
  height: 100%;
  background: var(--ngs-gold);
  border-radius: 2px;
}
.ngs-gpa-floor {
  position: absolute;
  top: -3px; bottom: -3px;
  width: 1.5px;
  background: var(--ngs-navy);
  opacity: 0.6;
}
.ngs-gpa-floor-label {
  font-family: var(--ngs-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ngs-muted);
  margin-bottom: 28px;
}
.ngs-history {
  display: flex; flex-direction: column;
  border-top: 1px solid var(--ngs-rule);
}
.ngs-history-head {
  font-family: var(--ngs-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ngs-muted);
  padding: 14px 0 8px;
}
.ngs-history-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 12px 0;
  border-bottom: 1px dotted var(--ngs-rule);
}
.ngs-history-row:last-child { border-bottom: 0; }
.ngs-history-row.is-current {
  background: var(--ngs-paper-2);
  margin: 0 -14px;
  padding: 12px 14px;
  border-radius: 4px;
  border-bottom: 0;
}
.ngs-history-term {
  font-size: 14px;
  color: var(--ngs-navy);
}
.ngs-history-row.is-current .ngs-history-term { font-weight: 600; }
.ngs-history-grade {
  font-family: var(--ngs-mono);
  font-size: 13px;
  color: var(--ngs-navy);
}
.ngs-history-grade.is-good { color: #2C7A4B; }
.ngs-history-grade.is-warn { color: #B57E1E; }
.ngs-history-grade.is-active { color: var(--ngs-gold); }

/* ── SUPPORT / INVESTMENT ────────────────────────────────── */
.ngs-support-summary {
  display: flex; flex-direction: column; gap: 8px;
  padding: 24px;
  background: var(--ngs-navy);
  color: var(--ngs-paper);
  border-radius: 6px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.ngs-support-summary::before {
  content: '';
  position: absolute; right: -40px; top: -40px;
  width: 180px; height: 180px;
  border: 1px solid rgba(201, 168, 76, 0.2);
  border-radius: 999px;
}
.ngs-support-summary::after {
  content: '';
  position: absolute; right: -10px; top: -10px;
  width: 100px; height: 100px;
  border: 1px solid rgba(201, 168, 76, 0.15);
  border-radius: 999px;
}
.ngs-support-summary-label {
  font-family: var(--ngs-mono);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ngs-gold);
  position: relative;
  z-index: 1;
}
.ngs-support-summary-value {
  font-family: var(--ngs-display);
  font-size: 44px;
  font-weight: 400;
  letter-spacing: -0.025em;
  color: var(--ngs-paper);
  line-height: 1;
  position: relative; z-index: 1;
}
.ngs-support-summary-foot {
  font-size: 12.5px;
  color: rgba(250, 247, 240, 0.6);
  position: relative; z-index: 1;
}
.ngs-support-progress {
  margin-top: 12px;
  position: relative; z-index: 1;
}
.ngs-support-progress-label {
  display: flex; justify-content: space-between;
  font-family: var(--ngs-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(250, 247, 240, 0.55);
  margin-bottom: 6px;
}
.ngs-support-progress-bar {
  height: 4px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 2px;
  overflow: hidden;
}
.ngs-support-progress-fill {
  height: 100%;
  background: var(--ngs-gold);
  border-radius: 2px;
}

.ngs-support-cats {
  display: flex; flex-direction: column; gap: 0;
}
.ngs-support-cat {
  display: flex; align-items: flex-start; gap: 16px;
  padding: 18px 0;
  border-top: 1px solid var(--ngs-rule);
}
.ngs-support-cat:last-child { border-bottom: 1px solid var(--ngs-rule); }
.ngs-support-cat-icon {
  width: 40px; height: 40px;
  border-radius: 4px;
  background: var(--ngs-paper);

.ngs-support-cat-name {

/* ── MILESTONES ───────────────────────────────────────────── */
.ngs-mlist {
  display: flex; flex-direction: column;
}
.ngs-mrow {
  display: flex; align-items: flex-start; gap: 16px;

}
.ngs-mrow:last-child { border-bottom: 1px solid var(--ngs-rule); }
.ngs-mrow-icon {

}
.ngs-mrow.is-done .ngs-mrow-icon { background: var(--ngs-gold); color: var(--ngs-navy); }
.ngs-mrow.is-future .ngs-mrow-icon {
  background: var(--ngs-paper);
  border: 1px solid var(--ngs-rule);
  color: var(--ngs-muted);
}
.ngs-mrow-body { flex: 1; padding-top: 2px; }
.ngs-mrow-head {
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 12px;
  margin-bottom: 4px;
}
.ngs-mrow-name {
  font-family: var(--ngs-display);
  font-size: 18px;
  color: var(--ngs-navy);
}
.ngs-mrow.is-future .ngs-mrow-name { color: var(--ngs-ink-soft); }
.ngs-mrow-badge {
  font-family: var(--ngs-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
  white-space: nowrap;
}
.ngs-mrow.is-done .ngs-mrow-badge {
  background: var(--ngs-paper-2);
  color: var(--ngs-navy);
}
.ngs-mrow.is-future .ngs-mrow-badge {
  background: transparent;
  border: 1px solid var(--ngs-rule);
  color: var(--ngs-muted);
}
.ngs-mrow-detail {
  font-size: 13.5px;
  color: var(--ngs-ink-soft);
  line-height: 1.45;
}

/* ── TRAVELS ──────────────────────────────────────────────── */
.ngs-travels {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.ngs-travel {
  padding: 18px 16px;
  background: var(--ngs-paper);
  border: 1px solid var(--ngs-rule);
  border-radius: 4px;
}
.ngs-travel.is-paper-2 { background: var(--ngs-paper-2); }
.ngs-travel-icon {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ngs-navy);
  margin-bottom: 12px;
}
.ngs-travel.is-done .ngs-travel-icon { color: var(--ngs-gold); }
.ngs-travel-dest {
  font-family: var(--ngs-display);
  font-size: 19px;
  color: var(--ngs-navy);
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}
.ngs-travel-when {
  font-size: 12px;
  color: var(--ngs-ink-soft);
  line-height: 1.4;
  margin-bottom: 12px;
}
.ngs-travel-status {
  display: inline-block;
  font-family: var(--ngs-mono);
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 3px 7px;
  border-radius: 3px;
}
.ngs-travel-status.is-done {
  background: var(--ngs-gold);
  color: var(--ngs-navy);
}
.ngs-travel-status.is-booked {
  background: var(--ngs-navy);
  color: var(--ngs-gold);
}
.ngs-travel-status.is-planned {
  background: transparent;
  color: var(--ngs-muted);
  border: 1px solid var(--ngs-rule);
}

/* ── ENGLISH STAGES ──────────────────────────────────────── */
.ngs-english {
  padding: 24px;
  background: var(--ngs-paper);
  border: 1px solid var(--ngs-rule);
  border-radius: 6px;
}
.ngs-english.is-paper-host { background: var(--ngs-paper-2); }
.ngs-english-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 22px;
  flex-wrap: wrap; gap: 8px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--ngs-rule);
}
.ngs-english-title {
  font-family: var(--ngs-display);
  font-size: 22px;
  color: var(--ngs-navy);
}
.ngs-english-target {
  font-family: var(--ngs-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ngs-gold);
  font-weight: 600;
}
.ngs-estages {
  display: flex; flex-direction: column;
  position: relative;
}
.ngs-estage {
  display: flex; gap: 14px;
  padding: 12px 0;
  position: relative;
}
.ngs-estage-rail {
  position: absolute;
  left: 11px; top: 30px; bottom: -12px;
  width: 1.5px;
  background: var(--ngs-rule);
}
.ngs-estage:last-child .ngs-estage-rail { display: none; }
.ngs-estage-rail.is-done { background: var(--ngs-gold); }
.ngs-estage-dot {
  width: 22px; height: 22px;
  border-radius: 999px;
  border: 2px solid var(--ngs-rule);
  background: var(--ngs-paper);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  z-index: 1;
}
.ngs-estage.is-done .ngs-estage-dot {
  background: var(--ngs-gold);
  border-color: var(--ngs-gold);
}
.ngs-estage.is-active .ngs-estage-dot {
  background: var(--ngs-navy);
  border-color: var(--ngs-navy);
}
.ngs-estage-pulse {
  width: 6px; height: 6px;
  border-radius: 999px;
  background: var(--ngs-gold);
  animation: ngs-pulse 1.8s ease-in-out infinite;
}
.ngs-estage-body {
  flex: 1;
  padding-top: 1px;
}
.ngs-estage-label {
  font-size: 13.5px;
  color: var(--ngs-ink);
  line-height: 1.5;
}
.ngs-estage.is-future .ngs-estage-label { color: var(--ngs-muted); }
.ngs-estage-tag {
  font-family: var(--ngs-mono);
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ngs-muted);
  margin-top: 4px;
  display: inline-block;
}
.ngs-estage.is-done .ngs-estage-tag { color: var(--ngs-navy); }
.ngs-estage.is-active .ngs-estage-tag { color: var(--ngs-gold); }

/* ── PATHWAY (horizontal scrolling) ──────────────────────── */
.ngs-pathway {
  padding: 24px 0 24px 24px;
  background: var(--ngs-navy);
  color: var(--ngs-paper);
  margin: 0 -24px;
  overflow-x: auto;
  scrollbar-width: thin;
}
.ngs-pathway-track {
  display: flex; align-items: flex-start;
  gap: 0;
  padding-right: 24px;
  min-width: max-content;
}
.ngs-pstep {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px;
  width: 88px;
  flex-shrink: 0;
}
.ngs-pstep-circle {
  width: 40px; height: 40px;
  border-radius: 999px;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: rgba(255, 255, 255, 0.04);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--ngs-mono);
  font-size: 12px; font-weight: 600;
  color: rgba(250, 247, 240, 0.4);
}
.ngs-pstep.is-done .ngs-pstep-circle {
  background: var(--ngs-gold);
  border-color: var(--ngs-gold);
  color: var(--ngs-navy);
}
.ngs-pstep.is-active .ngs-pstep-circle {
  background: var(--ngs-navy);
  border-color: var(--ngs-gold);
  color: var(--ngs-gold);
  box-shadow: 0 0 0 4px rgba(201,168,76,0.15);
}
.ngs-pstep.is-goal .ngs-pstep-circle {
  border-color: var(--ngs-gold);
  color: var(--ngs-gold);
  background: rgba(201,168,76,0.1);
}
.ngs-pstep.is-optional .ngs-pstep-circle {
  border-style: dashed;
  border-color: rgba(255,255,255,0.25);
}
.ngs-pstep-label {
  font-size: 10.5px;
  text-align: center;
  line-height: 1.3;
  color: rgba(250, 247, 240, 0.55);
  letter-spacing: 0.02em;
  font-weight: 500;
}
.ngs-pstep.is-done .ngs-pstep-label { color: var(--ngs-gold); }
.ngs-pstep.is-active .ngs-pstep-label { color: var(--ngs-paper); font-weight: 600; }
.ngs-pstep.is-goal .ngs-pstep-label { color: var(--ngs-gold); font-weight: 600; }

.ngs-pline {
  flex: 0 0 16px;
  height: 1.5px;
  margin-top: 19px;
  background: rgba(255,255,255,0.12);
}
.ngs-pline.is-done { background: var(--ngs-gold); }
.ngs-pline.is-dashed {
  background: none;
  border-top: 1.5px dashed rgba(255,255,255,0.25);
  height: 0;
}

/* ── FOOTER ───────────────────────────────────────────────── */
.ngs-pfooter {
  padding: 36px 24px 28px;
  background: var(--ngs-navy-ink);
  color: rgba(250, 247, 240, 0.7);
}
.ngs-pfooter-left {
  font-family: var(--ngs-display);
  font-size: 17px;
  color: var(--ngs-gold-soft);
  margin-bottom: 8px;
}
.ngs-pfooter-meta {
  display: flex; justify-content: space-between; align-items: baseline;
  flex-wrap: wrap; gap: 8px;
  padding-top: 18px;
  border-top: 1px solid rgba(255,255,255,0.08);
  font-family: var(--ngs-mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(250, 247, 240, 0.4);
}

/* ── DESKTOP UP ───────────────────────────────────────────── */
.ngs-profile.is-desktop {
  max-width: 1280px;
  margin: 0 auto;
}
.ngs-profile.is-desktop .ngs-pnav-inner { padding: 18px 80px; max-width: 1200px; margin: 0 auto; }
.ngs-profile.is-desktop .ngs-phead {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  align-items: end;
}
.ngs-profile.is-desktop .ngs-phead-photo {
  aspect-ratio: auto;
  height: 100%;
  min-height: 540px;
}
.ngs-profile.is-desktop .ngs-phead-photo::before {
  background: linear-gradient(to right, transparent, var(--ngs-navy));
  inset: 0 0 0 auto;
  width: 50%; height: 100%;
}
.ngs-profile.is-desktop .ngs-phead-meta { padding: 64px 80px 64px 40px; margin-top: 0; }
.ngs-profile.is-desktop .ngs-phead-name { font-size: 96px; }
.ngs-profile.is-desktop .ngs-phead-school { font-size: 16px; max-width: 40ch; }
.ngs-profile.is-desktop .ngs-phead-stats strong { font-size: 32px; }
.ngs-profile.is-desktop .ngs-pquote { padding: 80px 80px; }
.ngs-profile.is-desktop .ngs-pquote-body { font-size: 36px; max-width: 24ch; }
.ngs-profile.is-desktop .ngs-psection { padding: 96px 80px; }
.ngs-profile.is-desktop .ngs-psection h2 { font-size: 48px; }
.ngs-profile.is-desktop .ngs-two-col {
  display: grid; grid-template-columns: 1fr 1fr; gap: 48px;
}
.ngs-profile.is-desktop .ngs-travels {
  grid-template-columns: repeat(3, 1fr);
}
.ngs-profile.is-desktop .ngs-pathway { margin: 0; border-radius: 8px; padding: 36px 40px; }
.ngs-profile.is-desktop .ngs-pstep { width: 110px; }
.ngs-profile.is-desktop .ngs-pline { flex: 1 0 auto; }
.ngs-profile.is-desktop .ngs-pfooter { padding: 48px 80px 36px; }
</style>
</head>

<script type="text/babel">

<script type="text/babel">
// ScholarProfile — renders a scholar dashboard from a `data` prop.
// Used by both Claire.html and April.html. Mounts on window for cross-file access.

const { useState: useStateP } = React;

function ScholarProfile({ data, palette, isMobile }) {
  return (
    <div className={`ngs-profile ${isMobile ? 'is-mobile' : 'is-desktop'}`}
         data-screen-label={`${data.firstName} — Profile`}>
      <TopNav data={data}/>
      <PhotoHeader data={data} palette={palette}/>
      {data.quote && <PullQuote quote={data.quote}/>}
      {data.trialBanner && <TrialBanner text={data.trialBanner}/>}
      {data.trialProgress && <TrialProgressSection data={data.trialProgress}/>}
      {data.currentSemester && <SemesterSection data={data.currentSemester} palette={palette}/>}
      {data.academics && <AcademicSection data={data.academics} palette={palette}/>}
      {data.support && <SupportSection data={data.support}/>}
      {data.milestones && <MilestonesSection items={data.milestones}/>}
      {data.travels && <TravelsSection items={data.travels}/>}
      {data.english && <EnglishSection data={data.english}/>}
      {data.pathway && <PathwaySection data={data.pathway}/>}
      <ProfileFooter data={data}/>
    </div>
  );
}

// ─── TRIAL BANNER ──────────────────────────────────────────
function TrialBanner({ text }) {
  return (
    <section className="ngs-tbanner">
      <div className="ngs-tbanner-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" strokeWidth="1.6"
             strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 7v5l3 2"/>
        </svg>
      </div>
      <p className="ngs-tbanner-text" dangerouslySetInnerHTML={{__html: text}}/>
    </section>
  );
}

// ─── TRIAL PROGRESS ────────────────────────────────────────
function TrialProgressSection({ data }) {
  return (
    <section className="ngs-psection is-paper-2">
      <SectionEyebrow>Trial period</SectionEyebrow>
      <h2>{data.title}</h2>
      <p className="ngs-psection-intro">{data.intro}</p>

      <div className="ngs-tprogress">
        {data.semesters.map((s, i) => (
          <div key={i} className={`ngs-tsem is-${s.state}`}>
            <div className="ngs-tsem-label">{s.label}</div>
            <div className="ngs-tsem-grade">{s.grade}</div>
            <div className="ngs-tsem-status">{s.status}</div>
          </div>
        ))}
      </div>

      <div className="ngs-tfloor">
        <span className="ngs-tfloor-mark">▲</span>

      </div>
    </section>

<script type="text/babel">
const { useState: useStateApp, useEffect: useEffectApp } = React;

function App() {
  const [isDesktop, setIsDesktop] = useStateApp(
    () => window.matchMedia('(min-width: 960px)').matches
  );

  useEffectApp(() => {
    const mq = window.matchMedia('(min-width: 960px)');
    const handler = (e) => setIsDesktop(e.matches);
    mq.addEventListener('change', handler);
    return () => mq.removeEventListener('change', handler);
  }, []);

  return (
    <ScholarProfile
      data={window.APRIL_DATA}
      palette={{}}
      isMobile={!isDesktop}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

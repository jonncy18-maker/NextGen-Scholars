<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>NextGen Scholars</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Manrope:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
body { margin: 0; }

/* NextGen Scholars — design system
   Navy + gold + warm white. Newsreader display, Manrope body.
   Mobile-first; the site lives inside a ~390px iOS frame by default but
   gracefully scales up if the viewport tweak is set to desktop.
*/

:root {
  --ngs-navy: #1B2A4A;
  --ngs-navy-deep: #131F38;
  --ngs-navy-ink: #0E1A33;
  --ngs-gold: #C9A84C;
  --ngs-gold-soft: #E4C97A;
  --ngs-paper: #FAF7F0;
  --ngs-paper-2: #F2EDE2;
  --ngs-ink: #1A1A1A;
  --ngs-ink-soft: #4A4E5E;
  --ngs-muted: #6B6E7A;
  --ngs-rule: rgba(27, 42, 74, 0.12);
  --ngs-rule-light: rgba(255, 255, 255, 0.18);
  --ngs-red: #B11B2A;
  --ngs-blue: #0038A8;
  --ngs-yellow: #FCD116;

  --ngs-display: 'Newsreader', 'Source Serif Pro', 'Iowan Old Style', Georgia, serif;
  --ngs-sans: 'Manrope', 'Helvetica Neue', Helvetica, system-ui, sans-serif;
  --ngs-mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;
}

.ngs-site, .ngs-site * {
  box-sizing: border-box;
}
.ngs-site {
  font-family: var(--ngs-sans);
  font-feature-settings: 'ss01', 'cv11';
  color: var(--ngs-ink);
  background: var(--ngs-paper);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.5;
  font-size: 15px;
  min-height: 100%;
}
.ngs-site h1, .ngs-site h2, .ngs-site h3, .ngs-site h4 {
  margin: 0;
  font-weight: 500;
  letter-spacing: -0.01em;
  text-wrap: balance;
}
.ngs-site p { margin: 0; }
.ngs-site a { color: inherit; text-decoration: none; }
.ngs-site button { font-family: inherit; cursor: pointer; border: 0; background: none; }
.ngs-site ol, .ngs-site ul { margin: 0; padding: 0; list-style: none; }
.ngs-site em, .ngs-italic {
  font-family: var(--ngs-display);
  font-style: italic;
  font-weight: 400;
}

/* nav */
.ngs-nav {
  position: sticky; top: 0; z-index: 30;
  background: rgba(250, 247, 240, 0.86);
  backdrop-filter: blur(14px) saturate(180%);
  -webkit-backdrop-filter: blur(14px) saturate(180%);
  border-bottom: 1px solid var(--ngs-rule);
}
.ngs-nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
}
.ngs-site.is-mobile .ngs-nav-inner {
  padding-top: 64px;
}
.ngs-nav-brand {
  display: flex; align-items: center; gap: 10px;
  color: var(--ngs-navy);
}
.ngs-nav-name {
  font-family: var(--ngs-display);
  font-size: 16px; font-weight: 500; letter-spacing: -0.01em;
}
.ngs-nav-btn {
  width: 38px; height: 38px; border-radius: 999px;
  display: flex; flex-direction: column; gap: 4px;
  align-items: center; justify-content: center;
  background: var(--ngs-navy);
}
.ngs-nav-btn span {
  display: block; width: 14px; height: 1.5px;
  background: var(--ngs-gold);
  border-radius: 1px;
}
.ngs-nav-btn:focus-visible {
  outline: 2px solid var(--ngs-gold);
  outline-offset: 2px;
}
.ngs-nav-menu {
  border-top: 1px solid var(--ngs-rule);
  padding: 8px 20px 16px;
  display: flex; flex-direction: column;
  background: var(--ngs-paper);
}
.ngs-nav-menu a {
  padding: 12px 0;
  font-size: 17px;
  color: var(--ngs-navy);
  border-bottom: 1px solid var(--ngs-rule);
  display: flex; justify-content: space-between; align-items: center;
}
.ngs-nav-menu a::after { content: '→'; opacity: 0.4; }
.ngs-nav-menu-cta {
  color: var(--ngs-gold) !important;
  font-weight: 600;
}

/* monogram */
.ngs-mark {
  display: inline-flex; padding: 6px 9px;
  background: var(--ngs-navy);
  color: var(--ngs-gold);
  font-family: var(--ngs-display);
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.18em;
  border-radius: 3px;
}
.ngs-mark span + span { margin-left: 1px; }
.ngs-mark-sm { padding: 5px 8px; font-size: 11px; }

/* HERO */
.ngs-hero {
  position: relative;
  background: var(--ngs-navy);
  color: var(--ngs-paper);
  overflow: hidden;
  padding: 56px 24px 80px;
  isolation: isolate;
}
.ngs-hero-flag {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 0;
}
.ngs-hero-grain {
  position: absolute; inset: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.06) 1px, transparent 1px),
    radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.04) 1px, transparent 1px),
    radial-gradient(1px 1px at 80% 20%, rgba(201,168,76,0.08) 1px, transparent 1px);
  background-size: 80px 80px, 110px 110px, 130px 130px;
  z-index: 0;
  mix-blend-mode: screen;
  opacity: 0.6;
}
.ngs-hero-inner {
  position: relative; z-index: 2;
}
.ngs-hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ngs-gold-soft);
  margin-bottom: 36px;
}
.ngs-dot {
  width: 6px; height: 6px; border-radius: 999px;
  display: inline-block;
}
.ngs-hero-title {
  font-family: var(--ngs-display);
  font-size: 56px; line-height: 1.0; font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--ngs-paper);
  margin: 0 0 24px;
}
.ngs-hero-title em {
  color: var(--ngs-gold);
}
.ngs-hero-sub {
  font-size: 16px;
  line-height: 1.55;
  color: rgba(250, 247, 240, 0.78);
  max-width: 32ch;
  text-wrap: pretty;
}
.ngs-hero-cta {
  display: flex; flex-direction: column; gap: 10px;
  margin-top: 32px;
}
.ngs-hero-meta {
  display: flex; align-items: stretch; gap: 14px;
  margin-top: 56px;
  padding-top: 24px;
  border-top: 1px solid rgba(255, 255, 255, 0.14);
}
.ngs-hero-meta > div:not(.ngs-hero-meta-rule) {
  display: flex; flex-direction: column; gap: 2px; flex: 1;
}
.ngs-hero-meta strong {
  font-family: var(--ngs-display);
  font-size: 28px; font-weight: 400;
  color: var(--ngs-gold);
  letter-spacing: -0.02em;
}
.ngs-hero-meta-sep {
  font-family: var(--ngs-display);
  font-style: normal;
  margin: 0 4px;
  color: rgba(228, 201, 122, 0.55);
}
.ngs-hero-meta span {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: rgba(250, 247, 240, 0.55);
}
.ngs-hero-meta-rule {
  width: 1px; background: rgba(255, 255, 255, 0.12);
}
.ngs-hero-scroll {
  position: absolute;
  right: 24px; bottom: 24px;
  z-index: 2;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em;
  color: rgba(255, 255, 255, 0.4);
}
.ngs-hero-scroll-line {
  width: 1px; height: 36px;
  background: linear-gradient(to bottom, var(--ngs-gold), transparent);
}

/* buttons */
.ngs-btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  padding: 13px 18px;
  border-radius: 4px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.02em;
  transition: transform 0.15s ease, background 0.2s ease, color 0.2s ease;
}
.ngs-btn-gold {
  background: var(--ngs-gold);
  color: var(--ngs-navy);
}
.ngs-btn-gold:active { transform: scale(0.98); }
.ngs-btn:focus-visible { outline: 2px solid var(--ngs-gold); outline-offset: 2px; }
.ngs-btn-gold:focus-visible { outline: 2px solid var(--ngs-navy); outline-offset: 2px; }
.ngs-btn-ghost {
  border: 1px solid rgba(250, 247, 240, 0.3);
  color: var(--ngs-paper);
}
.ngs-btn-ghost-light {
  border-color: rgba(250, 247, 240, 0.4);
  color: var(--ngs-paper);
}
.ngs-btn-full { width: 100%; }
.ngs-btn.is-disabled { opacity: 0.4; cursor: not-allowed; }

/* section base */
.ngs-section {
  padding: 64px 24px;
  position: relative;
}
.ngs-eyebrow {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ngs-navy);
  margin-bottom: 18px;
  font-weight: 600;
}
.ngs-eyebrow-rule {
  width: 24px; height: 1px; background: var(--ngs-gold);
}
.ngs-eyebrow-light { color: var(--ngs-gold-soft); }
.ngs-eyebrow-rule-light { background: var(--ngs-gold); }
.ngs-h2 {
  font-family: var(--ngs-display);
  font-size: 38px; line-height: 1.05;
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--ngs-navy);
  margin-bottom: 18px;
}
.ngs-h2-light { color: var(--ngs-paper); }
.ngs-h2 .ngs-italic { color: var(--ngs-gold); }
.ngs-lede {
  font-size: 16px;
  line-height: 1.55;
  color: var(--ngs-ink-soft);
  max-width: 38ch;
  text-wrap: pretty;
}
.ngs-lede-light { color: rgba(250, 247, 240, 0.78); }
.ngs-lede-short { max-width: 32ch; }

/* ABOUT */
.ngs-about { background: var(--ngs-paper); }
.ngs-pillars {
  display: flex; flex-direction: column; gap: 28px;
  margin-top: 40px;
}
.ngs-pillar {
  padding: 20px 0;
  border-top: 1px solid var(--ngs-rule);
}
.ngs-pillar:last-child { border-bottom: 1px solid var(--ngs-rule); }
.ngs-pillar-num {
  font-family: var(--ngs-mono);
  font-size: 11px;
  color: var(--ngs-gold);
  letter-spacing: 0.15em;
  margin-bottom: 8px;
}
.ngs-pillar h3 {
  font-family: var(--ngs-display);
  font-size: 22px;
  color: var(--ngs-navy);
  margin-bottom: 6px;
}
.ngs-pillar p {
  font-size: 14.5px;
  color: var(--ngs-ink-soft);
  line-height: 1.55;
}

/* TRACKS */
.ngs-tracks {
  background: var(--ngs-paper-2);
  position: relative;
}
.ngs-tracks::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: var(--ngs-rule);
}
.ngs-track-grid {
  display: flex; flex-direction: column; gap: 18px;
  margin-top: 36px;
}
.ngs-track-card {
  background: var(--ngs-paper);
  border: 1px solid var(--ngs-rule);
  border-radius: 6px;
  padding: 24px 22px 22px;
  position: relative;
}
.ngs-track-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.ngs-track-icon {
  width: 52px; height: 52px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
}
.ngs-track-code {
  font-family: var(--ngs-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  padding: 5px 8px;
  border: 1px solid var(--ngs-rule);
  border-radius: 3px;
  color: var(--ngs-muted);
}
.ngs-track-name {
  font-family: var(--ngs-display);
  font-size: 26px;
  color: var(--ngs-navy);
  margin-bottom: 8px;
}
.ngs-track-blurb {
  font-size: 14.5px;
  color: var(--ngs-ink-soft);
  line-height: 1.55;
  margin-bottom: 18px;
}
.ngs-track-target-note {
  margin-bottom: 22px;
  padding: 12px 0;
  border-top: 1px solid var(--ngs-rule);
  border-bottom: 1px solid var(--ngs-rule);
}
.ngs-track-target-label {
  display: block;
  font-family: var(--ngs-mono);
  font-size: 10px;
  text-transform: uppercase;
  color: var(--ngs-muted);
  letter-spacing: 0.15em;
  margin-bottom: 6px;
}
.ngs-track-target-note p {
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--ngs-navy);
}
.ngs-track-pathway-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ngs-muted);
  margin-bottom: 12px;
}
.ngs-track-pathway ol {
  display: flex; flex-direction: column; gap: 10px;
}
.ngs-track-pathway li {
  display: flex; align-items: baseline; gap: 12px;
  font-size: 14px;
  color: var(--ngs-ink);
}
.ngs-step-num {
  font-family: var(--ngs-mono);
  font-size: 10.5px;
  color: var(--ngs-gold);
  letter-spacing: 0.12em;
  min-width: 18px;
}
.ngs-step-text {
  border-bottom: 1px dotted var(--ngs-rule);
  padding-bottom: 6px;
  flex: 1;
}
.ngs-track-pathway li:last-child .ngs-step-text { border-bottom: 0; }
.ngs-track-cta {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 22px;
  font-size: 13px; font-weight: 600;
  color: var(--ngs-navy);
  border-bottom: 1px solid var(--ngs-navy);
  padding-bottom: 4px;
}

/* MILESTONES */
.ngs-milestones { background: var(--ngs-paper); }
.ngs-timeline {
  position: relative;
  margin-top: 40px;
  padding-left: 4px;
}
.ngs-timeline-rail {
  position: absolute;
  left: 13px; top: 12px; bottom: 12px;
  width: 2px;
  background: var(--ngs-rule);
  border-radius: 1px;
}
.ngs-timeline-fill {
  width: 100%;
  border-radius: 1px;
  transition: height 0.4s ease;
}
.ngs-stage {
  display: flex; gap: 18px; align-items: flex-start;
  padding: 10px 0 18px;
  width: 100%;
  text-align: left;
  position: relative;
  color: inherit;
}
.ngs-stage-node {
  width: 28px; height: 28px;
  border-radius: 999px;
  background: var(--ngs-paper);
  border: 2px solid var(--ngs-rule);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  z-index: 1;
  transition: all 0.25s ease;
}
.ngs-stage-done .ngs-stage-node {
  background: var(--ngs-gold);
  border-color: var(--ngs-gold);
}
.ngs-stage-now .ngs-stage-node {
  background: var(--ngs-navy);
  border-color: var(--ngs-navy);
}
.ngs-stage-pulse {
  width: 8px; height: 8px;
  border-radius: 999px;
  background: var(--ngs-gold);
  box-shadow: 0 0 0 0 rgba(201, 168, 76, 0.6);
  animation: ngs-pulse 1.8s ease-in-out infinite;
}
@keyframes ngs-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(201, 168, 76, 0.5); }
  50% { box-shadow: 0 0 0 8px rgba(201, 168, 76, 0); }
}
.ngs-stage-body {
  padding-top: 1px;
  flex: 1;
}
.ngs-stage-step {
  font-family: var(--ngs-mono);
  font-size: 10.5px;
  letter-spacing: 0.15em;
  color: var(--ngs-muted);
  margin-bottom: 2px;
}
.ngs-stage-label {
  font-family: var(--ngs-display);
  font-size: 19px;
  color: var(--ngs-navy);
  margin-bottom: 4px;
}
.ngs-stage-detail {
  font-size: 13.5px;
  color: var(--ngs-ink-soft);
  line-height: 1.5;
}
.ngs-stage-next .ngs-stage-label,
.ngs-stage-next .ngs-stage-detail {
  opacity: 0.55;
}
.ngs-timeline-foot {
  margin-top: 20px;
  font-size: 13px;
  color: var(--ngs-muted);
}
.ngs-timeline-foot em { color: var(--ngs-navy); }

/* SCHOLARS */
.ngs-scholars { background: var(--ngs-paper-2); }
.ngs-scholar-list {
  display: flex; flex-direction: column; gap: 18px;
  margin-top: 36px;
}
.ngs-scholar-card {
  background: var(--ngs-paper);
  border: 1px solid var(--ngs-rule);
  border-radius: 6px;
  overflow: hidden;
}
.ngs-scholar-photo {
  position: relative;
  aspect-ratio: 4 / 3;
  background:
    repeating-linear-gradient(135deg,
      rgba(27, 42, 74, 0.05) 0 8px,
      rgba(27, 42, 74, 0.02) 8px 16px),
    var(--ngs-paper-2);
  display: flex; align-items: center; justify-content: center;
  border-bottom: 1px solid var(--ngs-rule);
}
.ngs-scholar-photo-inner {
  display: flex; flex-direction: column; align-items: center;
  font-family: var(--ngs-mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ngs-muted);
  gap: 4px;
}
.ngs-scholar-photo-inner span:last-child { opacity: 0.55; text-transform: lowercase; letter-spacing: 0.03em; }
.ngs-scholar-badge {
  position: absolute; top: 12px; right: 12px;
  padding: 4px 9px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  background: var(--ngs-paper);
  color: var(--ngs-navy);
}
.ngs-scholar-badge-active { background: var(--ngs-gold); color: var(--ngs-navy); }
.ngs-scholar-badge-trial { background: var(--ngs-navy); color: var(--ngs-gold); }
.ngs-scholar-badge-paused { background: var(--ngs-paper-2); color: var(--ngs-red); border: 1px solid var(--ngs-red); }
.ngs-scholar-body {
  padding: 20px 20px 22px;
}
.ngs-scholar-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 6px;
}
.ngs-scholar-head h3 {
  font-family: var(--ngs-display);
  font-size: 26px;
  color: var(--ngs-navy);
}
.ngs-scholar-track {
  font-family: var(--ngs-mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  color: var(--ngs-gold);
  font-weight: 600;
}
.ngs-scholar-meta {
  display: flex; gap: 8px;
  font-size: 13px;
  color: var(--ngs-muted);
  margin-bottom: 16px;
}
.ngs-scholar-dot { opacity: 0.5; }
.ngs-scholar-quote {
  margin: 0 0 18px;
  padding-left: 18px;
  position: relative;
  font-family: var(--ngs-display);
  font-style: italic;
  font-size: 16.5px;
  line-height: 1.4;
  color: var(--ngs-navy);
}
.ngs-scholar-quote-mark {
  position: absolute;
  left: 0; top: -8px;
  font-size: 36px;
  color: var(--ngs-gold);
  font-style: normal;
}
.ngs-scholar-note {
  margin: -6px 0 16px;
  padding: 10px 12px;
  background: var(--ngs-paper-2);
  border-left: 2px solid var(--ngs-gold);
  font-size: 12.5px;
  line-height: 1.5;
  color: var(--ngs-ink-soft);
  border-radius: 0 3px 3px 0;
}
.ngs-scholar-card-linked {
  display: block;
  text-decoration: none;
  color: inherit;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.ngs-scholar-card-linked:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(27, 42, 74, 0.13);
}
.ngs-scholar-dashboard-cta {
  display: flex; align-items: center; gap: 6px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--ngs-rule);
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ngs-navy);
  letter-spacing: 0.02em;
}
.ngs-scholar-progress {
  display: flex; flex-direction: column; gap: 6px;
}
.ngs-scholar-progress-track {
  height: 4px;
  background: var(--ngs-rule);
  border-radius: 2px;
  overflow: hidden;
}
.ngs-scholar-progress-fill {
  height: 100%;
  border-radius: 2px;
}
.ngs-scholar-progress-label {
  font-family: var(--ngs-mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ngs-muted);
}

/* APPLY */
.ngs-apply {
  background: var(--ngs-navy-deep);
  color: var(--ngs-paper);
  position: relative;
  overflow: hidden;
}
.ngs-apply-bg {
  position: absolute; inset: 0;
  background:

}
.ngs-apply-inner {

}
.ngs-form {

}
.ngs-field {
  display: flex; flex-direction: column; gap: 6px;
}
.ngs-field > span {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ngs-gold-soft);

}
.ngs-field input,
.ngs-field textarea {

  font-size: 15px;

.ngs-field textarea:focus {

.ngs-radio.is-active {

}
.ngs-radio:focus-visible { outline: 2px solid var(--ngs-gold); outline-offset: 2px; }
.ngs-form-foot {

.ngs-apply-sent {
  margin-top: 32px;
  padding: 32px 24px;

  border-radius: 6px;

}
.ngs-apply-check {
  width: 56px; height: 56px;
  border-radius: 999px;
  border: 1.5px solid;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
}
.ngs-apply-sent h3 {
  font-family: var(--ngs-display);

  font-size: 14px;

.ngs-footer-cols {

.ngs-footer-cols > div { display: flex; flex-direction: column; gap: 10px; }

/* desktop bump */

<script type="text/babel">
function IOSStatusBar({ dark = false, time = '9:41' }) {

  return (
    <div style={{

      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>

          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,

      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>

      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});
</script>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
});
</script>

            <h3 className="ngs-track-name">{t.name}</h3>
            <p className="ngs-track-blurb">{t.blurb}</p>

            <div className="ngs-track-target-note">
              <span className="ngs-track-target-label">Target</span>
              <p>{t.targetNote}</p>
            </div>

            <div className="ngs-track-pathway">
              <div className="ngs-track-pathway-label">Pathway</div>
              <ol>
                {t.steps.map((s, i) => (
                  <li key={i}>
                    <span className="ngs-step-num">{String(i+1).padStart(2,'0')}</span>
                    <span className="ngs-step-text">{s}</span>
                  </li>
                ))}
              </ol>
            </div>

            <a href="#apply" className="ngs-track-cta">
              Apply to {t.code} <IconArrow/>
            </a>
          </article>
        ))}
      </div>
    </section>
  );
}

function Milestones({ palette }) {
  const stages = [
    { label: 'High school', detail: 'Identification, family interview, trial period' },
    { label: 'University / Bootcamp', detail: 'Full tuition + board, monthly check-ins' },
    { label: 'Licensure', detail: 'PRC board / TESDA NC II / NCLEX-USA' },
    { label: 'Domestic placement', detail: 'PH hospital rotation or luxury hotel' },
    { label: 'International placement', detail: 'USA hospital, Australian hospital, or international cruise contract' },
  ];

  const [active, setActive] = useState(2);

  return (
    <section className="ngs-section ngs-milestones" id="journey">
      <div className="ngs-eyebrow">
        <span className="ngs-eyebrow-rule"></span>
        Scholar journey
      </div>
      <h2 className="ngs-h2">
        From classroom <span className="ngs-italic">to career.</span>
      </h2>
      <p className="ngs-lede ngs-lede-short">
        Five stages, often six to ten years. We stay through all of it.
      </p>

      <div className="ngs-timeline">
        <div className="ngs-timeline-rail" aria-hidden="true">
          <div className="ngs-timeline-fill" style={{
            height: `${(active / (stages.length - 1)) * 100}%`,
            background: palette.gold,
          }}/>
        </div>

        {stages.map((s, i) => {
          const state = i < active ? 'done' : i === active ? 'now' : 'next';
          return (
            <button
              key={i}
              onClick={() => setActive(i)}
              className={`ngs-stage ngs-stage-${state}`}
            >
              <div className="ngs-stage-node" aria-hidden="true">
                {state === 'done' && (
                  <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
                    <path d="M1 5l3.5 3.5L11 1.5" stroke={palette.navy} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                )}
                {state === 'now' && <span className="ngs-stage-pulse"></span>}
              </div>
              <div className="ngs-stage-body">
                <div className="ngs-stage-step">Stage {String(i+1).padStart(2,'0')}</div>
                <div className="ngs-stage-label">{s.label}</div>
                <div className="ngs-stage-detail">{s.detail}</div>
              </div>
            </button>
          );
        })}
      </div>

      <p className="ngs-timeline-foot">
        <em>Tap a stage</em> to see where a current scholar sits in their journey.
      </p>
    </section>
  );
}

function Scholars({ palette }) {
  const accentMap = { gold: palette.gold, red: palette.red };
  const scholars = [
    NGS_DATA.scholars.claire.card,
    NGS_DATA.scholars.april.card,
    NGS_DATA.scholars.aljane.card,
  ].map(c => ({ ...c, accent: accentMap[c.accentKey] || palette.gold }));

  return (
    <section className="ngs-section ngs-scholars" id="scholars">
      <div className="ngs-eyebrow">
        <span className="ngs-eyebrow-rule"></span>
        Meet the scholars
      </div>
      <h2 className="ngs-h2">
        Three lives <span className="ngs-italic">in motion.</span>
      </h2>
      <p className="ngs-lede ngs-lede-short">
        Names and photos are shared with each scholar's permission.
      </p>

      <div className="ngs-scholar-list">
        {scholars.map(s => {
          const Tag = s.href ? 'a' : 'article';

          return (
            <Tag key={s.name} {...linkProps}>
              <div className="ngs-scholar-photo" aria-label={`${s.name} portrait placeholder`}>
                <div className="ngs-scholar-photo-inner">
                  <span>portrait</span>
                  <span>{s.name.toLowerCase()}.jpg</span>
                </div>
                <div className={`ngs-scholar-badge ngs-scholar-badge-${s.status.toLowerCase()}`}>
                  {s.status}
                </div>
              </div>

              <div className="ngs-scholar-body">
                <div className="ngs-scholar-head">
                  <h3>{s.name}</h3>
                  <span className="ngs-scholar-track">{s.track}</span>
                </div>
                <div className="ngs-scholar-meta">
                  <span>{s.stage}</span>
                  <span className="ngs-scholar-dot">·</span>
                  <span>{s.year}</span>
                </div>

                <blockquote className="ngs-scholar-quote">
                  <span className="ngs-scholar-quote-mark">"</span>
                  {s.quote}
                </blockquote>

                {s.note && (
                  <p className="ngs-scholar-note">{s.note}</p>
                )}

                <div className="ngs-scholar-progress">
                  <div className="ngs-scholar-progress-track">
                    <div className="ngs-scholar-progress-fill" style={{
                      width: `${s.progress * 100}%`,
                      background: s.accent,
                    }}/>
                  </div>
                  <div className="ngs-scholar-progress-label">
                    Journey · {Math.round(s.progress * 100)}%
                  </div>
                </div>

                {s.href && (
                  <div className="ngs-scholar-dashboard-cta">
                    View dashboard
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                      <path d="M3 8h10m0 0l-4-4m4 4l-4 4" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </div>
                )}
              </div>
            </Tag>
          );
        })}
      </div>
    </section>
  );
}

function Apply({ palette }) {
  const [form, setForm] = useState({ name: '', email: '', track: '', message: '' });
  const [sent, setSent] = useState(false);

  const valid = form.name.trim() && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email) && form.track;

  const TRACK_LABELS = { NGN: 'NextGen Nurses', NGH: 'NextGen Hospitality', unsure: 'Not sure yet' };

  const submit = (e) => {
    e.preventDefault();
    if (!valid) return;
    const trackLabel = TRACK_LABELS[form.track] || form.track;
    const subject = encodeURIComponent(`NGS Nomination – ${form.name} (${trackLabel})`);
    const body = encodeURIComponent(
      `Name: ${form.name}\nEmail: ${form.email}\nTrack: ${trackLabel}\n\n${form.message || '(No additional message)'}`
    );
    window.location.href = `mailto:hello@nextgenscholars.ph?subject=${subject}&body=${body}`;
    setSent(true);
  };

  return (
    <section className="ngs-section ngs-apply" id="apply">
      <div className="ngs-apply-bg" aria-hidden="true"></div>

      <div className="ngs-apply-inner">
        <div className="ngs-eyebrow ngs-eyebrow-light">
          <span className="ngs-eyebrow-rule ngs-eyebrow-rule-light"></span>
          Apply / Contact
        </div>
        <h2 className="ngs-h2 ngs-h2-light">
          Tell us about <span className="ngs-italic">someone.</span>
        </h2>
        <p className="ngs-lede ngs-lede-light">
          We accept nominations from teachers, family, parish leaders, and
          scholars themselves. We read every message.
        </p>

        {sent ? (
          <div className="ngs-apply-sent">
            <div className="ngs-apply-check" style={{borderColor: palette.gold}}>
              <svg width="22" height="18" viewBox="0 0 22 18" fill="none">
                <path d="M2 9l6 6L20 3" stroke={palette.gold} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
            <h3>One more step.</h3>
            <p>Your email client should have opened with the nomination pre-filled — just hit Send. Didn't open? Write directly to <a href="mailto:hello@nextgenscholars.ph" style={{color: 'var(--ngs-gold)'}}>hello@nextgenscholars.ph</a>.</p>
            <button className="ngs-btn ngs-btn-ghost ngs-btn-ghost-light" onClick={() => { setSent(false); setForm({ name:'', email:'', track:'', message:'' }); }}>
              Send another
            </button>
          </div>
        ) : (
          <form className="ngs-form" onSubmit={submit} noValidate>
            <label className="ngs-field">
              <span>Your name</span>
              <input type="text" value={form.name} placeholder="Maria Santos"
                onChange={e => setForm({...form, name: e.target.value})}/>
            </label>
            <label className="ngs-field">
              <span>Email</span>
              <input type="email" value={form.email} placeholder="maria@example.com"
                onChange={e => setForm({...form, email: e.target.value})}/>
            </label>

            <div className="ngs-field">
              <span id="ngs-track-label">Which track?</span>
              <div className="ngs-radio-row" role="radiogroup" aria-labelledby="ngs-track-label">
                {[
                  { v: 'NGN', label: 'NextGen Nurses' },
                  { v: 'NGH', label: 'NextGen Hospitality' },
                  { v: 'unsure', label: 'Not sure yet' },
                ].map(o => (
                  <button key={o.v} type="button"
                    role="radio" aria-checked={form.track === o.v}
                    className={`ngs-radio ${form.track === o.v ? 'is-active' : ''}`}
                    onClick={() => setForm({...form, track: o.v})}>
                    {o.label}
                  </button>
                ))}
              </div>
            </div>

            <label className="ngs-field">
              <span>Tell us about the scholar</span>
              <textarea rows="4" value={form.message}
                placeholder="Who are they? What are they studying? How did you come to know them?"
                onChange={e => setForm({...form, message: e.target.value})}/>
            </label>

            <button type="submit" disabled={!valid}
              className={`ngs-btn ngs-btn-gold ngs-btn-full ${!valid ? 'is-disabled' : ''}`}>
              Send nomination <IconArrow/>
            </button>

            <p className="ngs-form-foot">
              Or write directly: <a href="mailto:hello@nextgenscholars.ph">hello@nextgenscholars.ph</a>
            </p>
          </form>
        )}
      </div>
    </section>
  );
}

function Footer() {
  return (
    <footer className="ngs-footer">
      <div className="ngs-footer-mark">
        <div className="ngs-mark">
          <span>N</span><span>G</span><span>S</span>
        </div>
        <div className="ngs-footer-tag">One generation lifts another.</div>
      </div>
      <div className="ngs-footer-cols">

        <div>

          <a href="#scholars">Scholars</a>
        </div>
        <div>
          <h4>Get in touch</h4>
          <a href="#apply">Apply</a>
          <a href="mailto:hello@nextgenscholars.ph">hello@nextgenscholars.ph</a>
        </div>
      </div>
      <div className="ngs-footer-fine">
        <span>© 2026 NextGen Scholars · Philippines · United States</span>
        <span>Privately funded · No public donations accepted</span>
      </div>
    </footer>
  );
}

function TopNav({ palette, isDesktop }) {
  const [open, setOpen] = useState(false);
  return (
    <header className="ngs-nav">
      <div className="ngs-nav-inner">
        <a href="#top" className="ngs-nav-brand">
          <div className="ngs-mark ngs-mark-sm">
            <span>N</span><span>G</span><span>S</span>
          </div>
          <span className="ngs-nav-name">NextGen Scholars</span>
        </a>
        {isDesktop ? (
          <nav className="ngs-nav-desktop">
            <a href="#about">About</a>
            <a href="#tracks">Tracks</a>
            <a href="#journey">Journey</a>
            <a href="#scholars">Scholars</a>
            <a href="#apply" className="ngs-nav-cta-link">Apply</a>
          </nav>
        ) : (
          <button className="ngs-nav-btn" onClick={() => setOpen(!open)}
            aria-label={open ? 'Close menu' : 'Open menu'}
            aria-expanded={open} aria-controls="ngs-nav-mobile-menu">
            <span></span><span></span>
          </button>
        )}
      </div>
      {!isDesktop && open && (
        <nav className="ngs-nav-menu" id="ngs-nav-mobile-menu" onClick={() => setOpen(false)}>
          <a href="#about">About</a>
          <a href="#tracks">Tracks</a>
          <a href="#journey">Journey</a>
          <a href="#scholars">Scholars</a>
          <a href="#apply" className="ngs-nav-menu-cta">Apply</a>
        </nav>
      )}
    </header>
  );
}

function NGSSite({ palette, isDesktop }) {
  return (
    <div className={`ngs-site ${isDesktop ? 'is-desktop' : ''}`} id="top">
      <TopNav palette={palette} isDesktop={isDesktop}/>
      <Hero palette={palette}/>
      <About/>
      <Tracks palette={palette}/>
      <Milestones palette={palette}/>
      <Scholars palette={palette}/>
      <Apply palette={palette}/>
      <Footer/>
    </div>
  );
}

window.NGSSite = NGSSite;
</script>

<!-- app.jsx -->
<script type="text/babel">
const { useState: useStateApp, useEffect: useEffectApp } = React;
const { useTweaks, TweaksPanel, TweakSection, TweakSelect } = window;
const NGSSite = window.NGSSite;

const TWEAK_DEFAULTS = {
  "palette": "navyGold",
  "headingFont": "newsreader",
};

const PALETTES = {
  navyGold: {
    navy: '#1B2A4A', navyDeep: '#131F38', navyInk: '#0E1A33',
    gold: '#C9A84C', goldSoft: '#E4C97A',
    paper: '#FAF7F0', paper2: '#F2EDE2',
    red: '#B11B2A', blue: '#0038A8', yellow: '#FCD116',
    label: 'Navy + Gold (default)',
  },
  midnightCopper: {
    navy: '#16213B', navyDeep: '#0F1828', navyInk: '#0B1220',
    gold: '#C97A3F', goldSoft: '#E8A471',
    paper: '#F7F2EA', paper2: '#EEE6D7',
    red: '#A82935', blue: '#0F3470', yellow: '#E8B931',
    label: 'Midnight + Copper',
  },
  inkChampagne: {
    navy: '#222B3D', navyDeep: '#1A2233', navyInk: '#121826',
    gold: '#B89968', goldSoft: '#D4B98A',
    paper: '#F4F0E8', paper2: '#EBE4D5',
    red: '#9F2433', blue: '#1B3F75', yellow: '#E0BE36',
    label: 'Ink + Champagne',
  },
};

const FONT_STACKS = {
  newsreader: {
    label: 'Newsreader + Manrope',
    display: "'Newsreader', 'Source Serif Pro', 'Iowan Old Style', Georgia, serif",
    body: "'Manrope', 'Helvetica Neue', Helvetica, system-ui, sans-serif",
  },
  fraunces: {
    label: 'Lora + Geist',
    display: "'Lora', 'Iowan Old Style', Georgia, serif",
    body: "'Geist', 'Helvetica Neue', Helvetica, system-ui, sans-serif",
  },
  spectral: {
    label: 'Spectral + DM Sans',
    display: "'Spectral', 'Iowan Old Style', Georgia, serif",
    body: "'DM Sans', 'Helvetica Neue', Helvetica, system-ui, sans-serif",
  },
};

function ApplyVars({ palette, fonts }) {
  useEffectApp(() => {
    const root = document.documentElement;
    root.style.setProperty('--ngs-navy', palette.navy);
    root.style.setProperty('--ngs-navy-deep', palette.navyDeep);
    root.style.setProperty('--ngs-navy-ink', palette.navyInk);
    root.style.setProperty('--ngs-gold', palette.gold);
    root.style.setProperty('--ngs-gold-soft', palette.goldSoft);
    root.style.setProperty('--ngs-paper', palette.paper);
    root.style.setProperty('--ngs-paper-2', palette.paper2);
    root.style.setProperty('--ngs-red', palette.red);
    root.style.setProperty('--ngs-display', fonts.display);
    root.style.setProperty('--ngs-sans', fonts.body);
  }, [palette, fonts]);
  return null;
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const palette = PALETTES[t.palette] || PALETTES.navyGold;
  const fonts = FONT_STACKS[t.headingFont] || FONT_STACKS.newsreader;

  const [isDesktop, setIsDesktop] = useStateApp(() =>
    window.matchMedia('(min-width: 960px)').matches
  );

  useEffectApp(() => {
    const mq = window.matchMedia('(min-width: 960px)');
    const handler = (e) => setIsDesktop(e.matches);
    mq.addEventListener('change', handler);
    return () => mq.removeEventListener('change', handler);
  }, []);

  return (
    <>
      <ApplyVars palette={palette} fonts={fonts}/>
      <NGSSite palette={palette} isDesktop={isDesktop}/>
      <TweaksPanel title="Tweaks">
        <TweakSection label="Palette">
          <TweakSelect
            label="Color scheme"
            value={t.palette}
            onChange={v => setTweak('palette', v)}
            options={Object.entries(PALETTES).map(([k, v]) => ({
              value: k, label: v.label,
            }))}
          />
          <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
            {[palette.navy, palette.gold, palette.paper, palette.red].map((c, i) => (
              <div key={i} style={{
                width: 28, height: 28, borderRadius: 4,
                background: c,
                border: '1px solid rgba(255,255,255,0.1)',
              }}/>
            ))}
          </div>
        </TweakSection>
        <TweakSection label="Typography">
          <TweakSelect
            label="Type pairing"
            value={t.headingFont}
            onChange={v => setTweak('headingFont', v)}
            options={Object.entries(FONT_STACKS).map(([k, v]) => ({
              value: k, label: v.label,
            }))}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
